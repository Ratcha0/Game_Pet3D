<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PetWorld 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: { 'neon-purple':'#8b5cf6','neon-pink':'#ec4899','neon-gold':'#f59e0b','surface':'#111827' },
                fontFamily: { 'sans':['Outfit','sans-serif'] }
            }}
        }
    </script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:#000; height:100vh; overflow:hidden; font-family:'Outfit',sans-serif; display:flex; align-items:center; justify-content:center; }
        .phone-frame { width:100%; max-width:430px; height:100vh; max-height:932px; position:relative; overflow:hidden; background:#080c18; }
        @media (min-width:431px) { .phone-frame { border-radius:3rem; border:8px solid #1a1a2e; box-shadow:0 0 80px rgba(139,92,246,0.1); } }
        .glass { background:rgba(17,24,39,0.75); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border:1px solid rgba(139,92,246,0.12); }
        .glow { box-shadow:0 0 20px rgba(139,92,246,0.1); }
        #three-canvas { position:absolute; inset:0; z-index:0; }
        .hud { position:absolute; inset:0; z-index:10; pointer-events:none; display:flex; flex-direction:column; }
        .hud>* { pointer-events:auto; }
        .act-btn { transition:all .2s; -webkit-tap-highlight-color:transparent; }
        .act-btn:active { transform:scale(.9); opacity:.8; }
        @keyframes fu { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-60px) scale(1.3)} }
        .float-up { animation:fu 1.8s ease-out forwards; }
        .no-scroll::-webkit-scrollbar { display:none; }
    </style>
  <script type="module" crossorigin src="/assets/game-CW937alU.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
</head>
<body class="text-white">

    <div class="phone-frame">
        <!-- 3D Canvas -->
        <div id="three-canvas"></div>

        <!-- HUD -->
        <div class="hud">
            <!-- Status Bar Spacer (iPhone notch area) -->
            <div class="h-[env(safe-area-inset-top,12px)]"></div>

            <!-- TOP -->
            <header class="flex justify-between items-start px-4 pt-2">
                <div class="glass glow rounded-2xl px-3 py-2 flex items-center gap-2.5">
                    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-neon-purple to-neon-pink flex items-center justify-center text-lg">🐱</div>
                    <div>
                        <h1 class="font-black text-[11px] tracking-tight text-white/90 leading-none">PetWorld 3D</h1>
                        <div class="flex items-center gap-1.5 mt-0.5">
                            <span id="season-badge" class="text-[6px] bg-neon-pink/80 px-1.5 py-px rounded-full font-bold uppercase text-white leading-tight">S1</span>
                            <span id="season-timer" class="text-[8px] text-white/25 font-semibold">7D</span>
                        </div>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-1">
                    <div class="glass glow rounded-xl px-3 py-1.5 flex items-center gap-1.5">
                        <span class="text-sm">🪙</span>
                        <span id="hud-tokens" class="font-black text-sm text-neon-gold leading-none">2,500</span>
                    </div>
                    <div class="glass rounded-lg px-2.5 py-1 flex items-center gap-1">
                        <span class="text-[8px] text-neon-purple">⭐</span>
                        <span class="font-bold text-[8px] text-white/40">Lv.<span id="hud-level" class="text-white">5</span></span>
                        <div class="w-10 h-[3px] bg-black/40 rounded-full overflow-hidden ml-0.5">
                            <div id="bar-xp" class="h-full bg-neon-purple rounded-full transition-all" style="width:35%"></div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- CENTER: tap area + feedback -->
            <div id="spawn-area" class="flex-1 relative overflow-hidden flex items-end justify-center pb-2 pointer-events-none">
                <div class="glass rounded-full px-3 py-1 text-[8px] text-white/20 font-semibold">
                    👆 แตะบนพื้นเพื่อเดินเล่น
                </div>
            </div>

            <!-- BOTTOM -->
            <div class="space-y-2 px-3 pb-3">
                <!-- Stats -->
                <div class="glass glow rounded-2xl py-2.5 px-4">
                    <div class="grid grid-cols-4 gap-2">
                        <div class="text-center">
                            <span class="text-xs">🍖</span>
                            <div class="h-[3px] bg-black/40 rounded-full overflow-hidden mt-0.5 mb-0.5"><div id="bar-hunger" class="h-full bg-gradient-to-r from-orange-500 to-amber-400 rounded-full transition-all" style="width:85%"></div></div>
                            <span id="val-hunger" class="text-[8px] font-bold text-white/30">85%</span>
                        </div>
                        <div class="text-center">
                            <span class="text-xs">💖</span>
                            <div class="h-[3px] bg-black/40 rounded-full overflow-hidden mt-0.5 mb-0.5"><div id="bar-happy" class="h-full bg-gradient-to-r from-pink-500 to-rose-400 rounded-full transition-all" style="width:92%"></div></div>
                            <span id="val-happy" class="text-[8px] font-bold text-white/30">92%</span>
                        </div>
                        <div class="text-center">
                            <span class="text-xs">🧼</span>
                            <div class="h-[3px] bg-black/40 rounded-full overflow-hidden mt-0.5 mb-0.5"><div id="bar-clean" class="h-full bg-gradient-to-r from-cyan-500 to-teal-400 rounded-full transition-all" style="width:70%"></div></div>
                            <span id="val-clean" class="text-[8px] font-bold text-white/30">70%</span>
                        </div>
                        <div class="text-center">
                            <span class="text-xs">⚡</span>
                            <div class="h-[3px] bg-black/40 rounded-full overflow-hidden mt-0.5 mb-0.5"><div id="bar-stamina" class="h-full bg-gradient-to-r from-emerald-500 to-green-400 rounded-full transition-all" style="width:90%"></div></div>
                            <span id="val-stamina" class="text-[8px] font-bold text-white/30">90%</span>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="glass glow rounded-2xl p-1.5 flex items-center justify-evenly">
                    <button onclick="doAction('feed')" class="act-btn flex flex-col items-center gap-px px-1 py-1">
                        <div class="w-11 h-11 rounded-xl bg-orange-500/10 border border-orange-500/15 flex items-center justify-center text-xl">🍗</div>
                        <span class="text-[6px] font-bold text-white/25 uppercase mt-0.5">Feed</span>
                        <span class="text-[6px] font-bold text-neon-pink/60">-<span id="cost-feed">10</span>🪙</span>
                    </button>
                    <button onclick="doAction('clean')" class="act-btn flex flex-col items-center gap-px px-1 py-1">
                        <div class="w-11 h-11 rounded-xl bg-cyan-500/10 border border-cyan-500/15 flex items-center justify-center text-xl">🧼</div>
                        <span class="text-[6px] font-bold text-white/25 uppercase mt-0.5">Clean</span>
                        <span class="text-[6px] font-bold text-neon-pink/60">-<span id="cost-clean">8</span>🪙</span>
                    </button>
                    <button onclick="doAction('repair')" class="act-btn flex flex-col items-center gap-px px-1 py-1">
                        <div class="w-11 h-11 rounded-xl bg-amber-500/10 border border-amber-500/15 flex items-center justify-center text-xl">💩</div>
                        <span class="text-[6px] font-bold text-white/25 uppercase mt-0.5">เก็บอึ</span>
                        <span class="text-[6px] font-bold text-neon-pink/60">-<span id="cost-repair">5</span>🪙</span>
                    </button>
                    <button onclick="doAction('play')" class="act-btn flex flex-col items-center gap-px px-1 py-1">
                        <div class="w-11 h-11 rounded-xl bg-green-500/10 border border-green-500/15 flex items-center justify-center text-xl">🎾</div>
                        <span class="text-[6px] font-bold text-white/25 uppercase mt-0.5">Play</span>
                        <span class="text-[6px] font-bold text-neon-pink/60">-<span id="cost-play">12</span>🪙</span>
                    </button>
                    <button onclick="toggleRanking()" class="act-btn flex flex-col items-center gap-px px-1 py-1">
                        <div class="w-11 h-11 rounded-xl bg-yellow-500/10 border border-yellow-500/15 flex items-center justify-center text-xl">🏆</div>
                        <span class="text-[6px] font-bold text-white/25 uppercase mt-0.5">Rank</span>
                    </button>
                </div>

                <!-- Home Bar -->
                <div class="flex justify-center pt-1 pb-[env(safe-area-inset-bottom,4px)]">
                    <div class="w-24 h-1 bg-white/10 rounded-full"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Ranking -->
    <div id="ranking-modal" class="fixed inset-0 z-[200] translate-y-full transition-transform duration-500 flex items-center justify-center">
        <div class="w-full max-w-[430px] h-full max-h-[932px] bg-surface/98 backdrop-blur-3xl rounded-t-3xl border-t border-neon-purple/20 flex flex-col p-5 pt-3 mt-[25%]">
            <div class="w-10 h-1 bg-white/10 rounded-full mx-auto mb-4 cursor-pointer" onclick="toggleRanking()"></div>
            <h2 class="text-lg font-black text-neon-purple mb-3">🏆 Ranking</h2>
            <div id="ranking-list" class="flex-1 overflow-y-auto space-y-2 no-scroll"></div>
        </div>
    </div>

</body>
</html>
