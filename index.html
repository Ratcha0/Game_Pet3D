<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PetWorld 3D - Ultimate Virtual Pet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:#000; min-height:100vh; overflow:hidden; font-family:'Outfit',sans-serif; }
        .phone-frame { width:100%; height:100vh; height:100dvh; position:relative; overflow:hidden; background:#080c18; }
        .hud { position:absolute; inset:0; z-index:10; pointer-events:none; display:flex; flex-direction:column; width: 100%; height: 100%; overflow: hidden; padding: env(safe-area-inset-top, 20px) 0 env(safe-area-inset-bottom, 16px) 0; }
        .hud-content { width: 100%; max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; height: 100%; position: relative; }
        .glass { background:rgba(15, 23, 42, 0.8); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.08); }
        .glow { box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        #three-canvas { position:absolute; inset:0; z-index:0; }
        .act-btn:active { transform: scale(0.92); }
        .no-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .no-scroll::-webkit-scrollbar { display: none; }
        
        /* แนวนอนของจริง (Orientation Landscape) */
        @media screen and (orientation: landscape) {
            .hud { padding: 8px 16px !important; }
            .hud-content { justify-content: space-between !important; }
            header { width: 100% !important; display: flex !important; justify-content: space-between !important; align-items: flex-start !important; padding: 0 20px !important; }
            #bottom-hud { 
                position: absolute !important; bottom: -10px !important; right: -20px !important; 
                transform: scale(0.65) !important; transform-origin: bottom right !important; 
                width: 480px !important; 
            }
            #spawn-area { display: none !important; }
            .glass { background: rgba(15, 23, 42, 0.45) !important; }
        }
    </style>
</head>
<body class="text-white">

    <div id="game-container" class="phone-frame transition-all duration-500">
        <!-- 3D Canvas -->
        <div id="three-canvas"></div>

        <div class="hud">
            <div class="hud-content">
                
                <!-- TOP DISTRIBUTED -->
                <header class="flex justify-between items-start px-6 pt-4 pointer-events-auto">
                    <!-- Left: Profile & XP -->
                    <div class="glass glow rounded-2xl px-5 py-3 flex items-center gap-3 border border-white/5">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-neon-purple to-neon-pink flex items-center justify-center text-xl shadow-lg">🐱</div>
                        <div class="leading-tight">
                            <h1 class="font-black text-xs text-white/90 uppercase tracking-tight">PetWorld 3D</h1>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-[9px] font-black text-neon-purple">LV.<span id="hud-level">5</span></span>
                                <div class="w-12 h-1 bg-black/40 rounded-full overflow-hidden">
                                    <div id="bar-xp" class="h-full bg-gradient-to-r from-neon-purple to-neon-pink" style="width:35%"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Wallet -->
                    <div class="flex flex-col items-end gap-3">
                        <div class="glass glow rounded-2xl px-5 py-3 flex items-center gap-2.5 border border-white/5">
                            <span class="text-base text-neon-gold">🪙</span>
                            <span id="hud-tokens" class="font-black text-sm text-neon-gold tracking-tight">2,500</span>
                        </div>
                    </div>
                </header>

                <!-- CENTER / INSTRUCTION -->
                <div id="spawn-area" class="flex-1 relative overflow-hidden flex items-start justify-center pt-12 pointer-events-none">
                    <div class="glass rounded-full px-6 py-2 text-[8px] text-white/20 font-black uppercase tracking-[0.4em] border border-white/5 backdrop-blur-xl">
                        👆 Tap Floor to Walk
                    </div>
                </div>

                <!-- BOTTOM CENTERED HUD -->
                <div id="bottom-hud" class="space-y-1 px-4 pb-2 pointer-events-auto">
                    <!-- Stats Grid -->
                    <div class="glass glow rounded-[1.5rem] py-3 px-5 border border-white/5 max-w-[480px] mx-auto w-full">
                        <div class="grid grid-cols-4 gap-4">
                            <div class="flex flex-col items-center gap-1">
                                <span class="text-lg">🍖</span>
                                <div class="w-full h-1 bg-black/40 rounded-full overflow-hidden"><div id="bar-hunger" class="h-full bg-gradient-to-r from-orange-500 to-amber-300 transition-all" style="width:85%"></div></div>
                                <span id="val-hunger" class="text-[7px] font-black text-white/20 tracking-tighter uppercase">85%</span>
                            </div>
                            <div class="flex flex-col items-center gap-1">
                                <span class="text-lg">💖</span>
                                <div class="w-full h-1 bg-black/40 rounded-full overflow-hidden"><div id="bar-happy" class="h-full bg-gradient-to-r from-pink-500 to-rose-300 transition-all" style="width:92%"></div></div>
                                <span id="val-happy" class="text-[7px] font-black text-white/20 tracking-tighter uppercase">92%</span>
                            </div>
                            <div class="flex flex-col items-center gap-1">
                                <span class="text-lg">🧼</span>
                                <div class="w-full h-1 bg-black/40 rounded-full overflow-hidden"><div id="bar-clean" class="h-full bg-gradient-to-r from-cyan-500 to-teal-300 transition-all" style="width:70%"></div></div>
                                <span id="val-clean" class="text-[7px] font-black text-white/20 tracking-tighter uppercase">70%</span>
                            </div>
                            <div class="flex flex-col items-center gap-1">
                                <span class="text-lg">⚡</span>
                                <div class="w-full h-1 bg-black/40 rounded-full overflow-hidden"><div id="bar-stamina" class="h-full bg-gradient-to-r from-emerald-500 to-green-300 transition-all" style="width:90%"></div></div>
                                <span id="val-stamina" class="text-[7px] font-black text-white/30 tracking-tighter uppercase leading-none">90%</span>
                            </div>
                        </div>
                    </div>

                    <!-- Actions Shelf -->
                    <div class="glass glow rounded-[2rem] p-1 flex items-center justify-between border border-white/5 max-w-[480px] mx-auto w-full">
                        <button onclick="doAction('feed')" class="act-btn flex-1 flex flex-col items-center gap-1.5 py-2">
                            <div class="w-9 h-9 rounded-xl bg-orange-500/10 border border-orange-500/20 flex items-center justify-center text-lg">🍗</div>
                            <span class="text-[7px] font-black text-white/30 uppercase tracking-widest leading-none">Feed</span>
                        </button>
                        <button onclick="doAction('clean')" class="act-btn flex-1 flex flex-col items-center gap-1.5 py-2">
                            <div class="w-9 h-9 rounded-xl bg-cyan-500/10 border border-cyan-500/20 flex items-center justify-center text-lg">🧼</div>
                            <span class="text-[7px] font-black text-white/30 uppercase tracking-widest leading-none">Clean</span>
                        </button>
                        <button onclick="doAction('repair')" class="act-btn flex-1 flex flex-col items-center gap-1.5 py-2">
                            <div class="w-9 h-9 rounded-xl bg-amber-500/10 border border-amber-500/20 flex items-center justify-center text-lg">💩</div>
                            <span class="text-[7px] font-black text-white/30 uppercase tracking-widest leading-none">Scoop</span>
                        </button>
                        <button onclick="doAction('play')" class="act-btn flex-1 flex flex-col items-center gap-1.5 py-2">
                            <div class="w-9 h-9 rounded-xl bg-green-500/10 border border-green-500/20 flex items-center justify-center text-lg">🎾</div>
                            <span class="text-[7px] font-black text-white/30 uppercase tracking-widest leading-none">Play</span>
                        </button>
                        <div class="w-px h-8 bg-white/5 mx-0.5"></div>
                        <button onclick="toggleRanking()" class="act-btn flex-1 flex flex-col items-center gap-1.5 py-2">
                            <div class="w-9 h-9 rounded-xl bg-yellow-500/10 border border-yellow-500/20 flex items-center justify-center text-lg">🏆</div>
                            <span class="text-[7px] font-black text-white/30 uppercase tracking-widest leading-none">Rank</span>
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Ranking Modal -->
    <div id="ranking-modal" class="fixed inset-0 z-[200] translate-y-full transition-transform duration-500 flex items-center justify-center">
        <div id="ranking-content" class="w-full max-w-[480px] h-full max-h-[850px] bg-slate-900/98 backdrop-blur-3xl rounded-t-[3rem] border-t border-white/10 flex flex-col p-6 pt-4 mt-[20vh] shadow-2xl overflow-hidden pointer-events-auto">
            <div id="ranking-handle" class="w-full py-4 flex flex-col items-center cursor-pointer">
                <div class="w-16 h-1.5 bg-white/20 rounded-full"></div>
            </div>
            <h2 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-neon-purple to-neon-pink mb-6 px-2 text-white">🏆 World Ranking</h2>
            <div id="ranking-list" class="flex-1 overflow-y-auto space-y-3 no-scroll px-1 pb-10"></div>
        </div>
    </div>

    <script type="module" src="/src/core/game.js"></script>
</body>
</html>
