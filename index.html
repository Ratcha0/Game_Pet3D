<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PetWorld 3D</title>
    <link rel="stylesheet" href="/src/styles/game.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:#000; min-height:100vh; overflow:hidden; font-family:'Outfit',sans-serif; display:flex; align-items:center; justify-content:center; }
        .phone-frame { width:100%; max-width:430px; height:100vh; height:100dvh; position:relative; overflow:hidden; background:#080c18; }
        @media (max-width:430px) { body { align-items:stretch; } .phone-frame { max-width:none; height:100%; min-height:100vh; } }
        @media (min-width:431px) { .phone-frame { border-radius:3rem; border:8px solid #1a1a2e; box-shadow:0 0 80px rgba(139,92,246,0.1); } }
        .glass { background:rgba(17,24,39,0.75); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border:1px solid rgba(139,92,246,0.12); }
        .glow { box-shadow:0 0 20px rgba(139,92,246,0.1); }
        #three-canvas { position:absolute; inset:0; z-index:0; }
        .hud { position:absolute; inset:0; z-index:10; pointer-events:none; display:flex; flex-direction:column; }
        .act-btn { transition:all .2s; -webkit-tap-highlight-color:transparent; }
        .act-btn:active { transform:scale(.9); opacity:.8; }
        @keyframes fu { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-60px) scale(1.3)} }
        .float-up { animation:fu 1.8s ease-out forwards; }
        .no-scroll::-webkit-scrollbar { display:none; }
    </style>
</head>
<body class="text-white">

    <div class="phone-frame">
        <!-- 3D Canvas -->
        <div id="three-canvas"></div>

        <!-- HUD -->
        <div class="hud">
            <!-- Status Bar Spacer (iPhone notch area) -->
            <div class="h-[env(safe-area-inset-top,12px)]"></div>

            <!-- Indicators & Radar System -->
            <div id="radar-system" class="absolute inset-0 pointer-events-none flex items-center justify-center">
                <!-- Decorative Radar Ring -->
                <div class="w-72 h-72 rounded-full border border-white/5 bg-white/0 lg:w-96 lg:h-96 relative">
                    <div class="absolute inset-0 rounded-full border border-neon-pink/10 animate-[ping_3s_infinite] opacity-20"></div>
                    <div id="poop-indicators" class="absolute inset-0"></div>
                </div>
            </div>

            <!-- TOP -->
            <header class="flex justify-between items-start px-6 pt-4 pointer-events-auto">
                <div class="glass glow rounded-2xl px-4 py-2.5 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-neon-purple to-neon-pink flex items-center justify-center text-xl shadow-lg ring-1 ring-white/20">🐱</div>
                    <div>
                        <h1 class="font-black text-xs tracking-tight text-white leading-none">PetWorld 3D</h1>
                        <div class="flex items-center gap-1.5 mt-1">
                            <span id="season-badge" class="text-[7px] bg-neon-pink px-2 py-0.5 rounded-full font-black uppercase text-white tracking-widest shadow-sm">S1</span>
                            <span id="season-timer" class="text-[9px] text-white/40 font-bold uppercase tracking-tighter">7 Days Left</span>
                        </div>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-2">
                    <div class="glass glow rounded-2xl px-4 py-2 flex items-center gap-2 border-white/5">
                        <span class="text-base">🪙</span>
                        <span id="hud-tokens" class="font-black text-sm text-neon-gold tracking-tight">2,500</span>
                    </div>
                    <div class="glass rounded-xl px-3 py-1.5 flex items-center gap-2 border-white/5">
                        <span class="text-[10px] text-neon-purple font-black">LV.</span>
                        <span id="hud-level" class="font-black text-[10px] text-white">5</span>
                        <div class="w-12 h-1 bg-black/40 rounded-full overflow-hidden">
                            <div id="bar-xp" class="h-full bg-gradient-to-r from-neon-purple to-neon-pink rounded-full transition-all" style="width:35%"></div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- CENTER: tap area + feedback -->
            <div id="spawn-area" class="flex-1 relative overflow-hidden flex items-end justify-center pb-6 pointer-events-none">
                <div class="glass rounded-full px-4 py-1.5 text-[9px] text-white/40 font-bold uppercase tracking-widest border-white/5">
                    👆 Tap floor to walk
                </div>
            </div>

            <!-- BOTTOM -->
            <div class="space-y-2 px-3 pb-4 pointer-events-auto">
                <!-- Stats Grid -->
                <div class="glass glow rounded-[1.5rem] py-3.5 px-5 border-white/10">
                    <div class="grid grid-cols-4 gap-3">
                        <div class="flex flex-col items-center gap-1">
                            <span class="text-base">🍖</span>
                            <div class="w-full h-1 bg-black/40 rounded-full overflow-hidden"><div id="bar-hunger" class="h-full bg-gradient-to-r from-orange-500 to-amber-300 rounded-full transition-all" style="width:85%"></div></div>
                            <span id="val-hunger" class="text-[8px] font-black text-white/30 tracking-tighter uppercase">85%</span>
                        </div>
                        <div class="flex flex-col items-center gap-1">
                            <span class="text-base">💖</span>
                            <div class="w-full h-1 bg-black/40 rounded-full overflow-hidden"><div id="bar-happy" class="h-full bg-gradient-to-r from-pink-500 to-rose-300 rounded-full transition-all" style="width:92%"></div></div>
                            <span id="val-happy" class="text-[8px] font-black text-white/30 tracking-tighter uppercase">92%</span>
                        </div>
                        <div class="flex flex-col items-center gap-1">
                            <span class="text-base">🧼</span>
                            <div class="w-full h-1 bg-black/40 rounded-full overflow-hidden"><div id="bar-clean" class="h-full bg-gradient-to-r from-cyan-500 to-teal-300 rounded-full transition-all" style="width:70%"></div></div>
                            <span id="val-clean" class="text-[8px] font-black text-white/30 tracking-tighter uppercase">70%</span>
                        </div>
                        <div class="flex flex-col items-center gap-1">
                            <span class="text-base">⚡</span>
                            <div class="w-full h-1 bg-black/40 rounded-full overflow-hidden"><div id="bar-stamina" class="h-full bg-gradient-to-r from-emerald-500 to-green-300 rounded-full transition-all" style="width:90%"></div></div>
                            <span id="val-stamina" class="text-[8px] font-black text-white/30 tracking-tighter uppercase">90%</span>
                        </div>
                    </div>
                </div>

                <!-- Actions Shelf -->
                <div class="glass glow rounded-[2.5rem] p-1.5 flex items-center justify-between border-white/10">
                    <button onclick="doAction('feed')" class="act-btn flex flex-col items-center gap-1 px-1.5 py-1.5">
                        <div class="w-11 h-11 rounded-2xl bg-orange-500/10 border border-orange-500/20 flex items-center justify-center text-xl shadow-inner">🍗</div>
                        <div class="flex flex-col items-center">
                            <span class="text-[7px] font-black text-white/40 uppercase tracking-widest">Feed</span>
                            <span class="text-[8px] font-black text-neon-pink leading-none">-<span id="cost-feed">10</span>⚡</span>
                        </div>
                    </button>
                    <button onclick="doAction('clean')" class="act-btn flex flex-col items-center gap-1 px-1.5 py-1.5">
                        <div class="w-11 h-11 rounded-2xl bg-cyan-500/10 border border-cyan-500/20 flex items-center justify-center text-xl shadow-inner">🧼</div>
                        <div class="flex flex-col items-center">
                            <span class="text-[7px] font-black text-white/40 uppercase tracking-widest">Clean</span>
                            <span class="text-[8px] font-black text-neon-pink leading-none">-<span id="cost-clean">8</span>⚡</span>
                        </div>
                    </button>
                    <button onclick="doAction('repair')" class="act-btn flex flex-col items-center gap-1 px-1.5 py-1.5">
                        <div class="w-11 h-11 rounded-2xl bg-amber-500/10 border border-amber-500/20 flex items-center justify-center text-xl shadow-inner">💩</div>
                        <div class="flex flex-col items-center">
                            <span class="text-[7px] font-black text-white/40 uppercase tracking-widest">Scoop</span>
                            <span class="text-[8px] font-black text-neon-pink leading-none">-<span id="cost-repair">5</span>⚡</span>
                        </div>
                    </button>
                    <button onclick="doAction('play')" class="act-btn flex flex-col items-center gap-1 px-1.5 py-1.5">
                        <div class="w-11 h-11 rounded-2xl bg-green-500/10 border border-green-500/20 flex items-center justify-center text-xl shadow-inner">🎾</div>
                        <div class="flex flex-col items-center">
                            <span class="text-[7px] font-black text-white/40 uppercase tracking-widest">Play</span>
                            <span class="text-[8px] font-black text-neon-pink leading-none">-<span id="cost-play">12</span>⚡</span>
                        </div>
                    </button>
                    <div class="w-px h-8 bg-white/5 mx-0.5"></div>
                    <button onclick="toggleRanking()" class="act-btn flex flex-col items-center gap-1 px-1.5 py-1.5">
                        <div class="w-11 h-11 rounded-2xl bg-yellow-500/10 border border-yellow-500/20 flex items-center justify-center text-xl shadow-inner">🏆</div>
                        <span class="text-[7px] font-black text-white/40 uppercase tracking-widest mt-0.5">Rank</span>
                    </button>
                </div>

                <!-- Home Indicator Area -->
                <div class="flex justify-center pt-1.5">
                    <div class="w-24 h-1 bg-white/10 rounded-full"></div>
                </div>
            </div>


        </div>
    </div>

    <!-- Ranking -->
    <div id="ranking-modal" class="fixed inset-0 z-[200] translate-y-full transition-transform duration-500 flex items-center justify-center">
        <div class="w-full max-w-[430px] h-full max-h-[932px] bg-surface/98 backdrop-blur-3xl rounded-t-3xl border-t border-neon-purple/20 flex flex-col p-5 pt-3 mt-[25%]">
            <div class="w-10 h-1 bg-white/10 rounded-full mx-auto mb-4 cursor-pointer" onclick="toggleRanking()"></div>
            <h2 class="text-lg font-black text-neon-purple mb-3">🏆 Ranking</h2>
            <div id="ranking-list" class="flex-1 overflow-y-auto space-y-2 no-scroll"></div>
        </div>
    </div>

    <script type="module" src="/src/core/game.js"></script>
</body>
</html>
