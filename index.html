<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PetWorld 3D - Ultimate Virtual Pet</title>
    <script>
        // ปิดการแจ้งเตือนที่น่ารำคาญ (Tailwind CDN / THREE.Clock) เพื่อความสบายตา
        const originalWarn = console.warn;
        console.warn = function(...args) {
            if (typeof args[0] === 'string' && (args[0].includes('cdn.tailwindcss.com') || args[0].includes('THREE.Clock'))) return;
            originalWarn.apply(console, args);
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:#000; min-height:100vh; overflow:hidden; font-family:'Outfit',sans-serif; }
        .phone-frame { width:100%; height:100vh; height:100dvh; position:relative; overflow:hidden; background:#080c18; }
        .hud { position:absolute; inset:0; z-index:10; pointer-events:none; display:flex; flex-direction:column; width: 100%; height: 100%; overflow: hidden; padding: env(safe-area-inset-top, 20px) 0 env(safe-area-inset-bottom, 16px) 0; }
        .hud-content { width: 100%; display: flex; flex-direction: column; height: 100%; position: relative; }
        .glass { background:rgba(15, 23, 42, 0.8); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.08); }
        .glow { box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        #three-canvas { position:absolute; inset:0; z-index:0; }
        .act-btn:active { transform: scale(0.92); }
        .no-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .no-scroll::-webkit-scrollbar { display: none; }
        
        /* --- RESPONSIVE CORE --- */
        @media (max-width: 400px) {
            .stats-panel, .action-panel { transform: scale(0.9); transform-origin: bottom center; }
            .profile-box { transform: scale(0.85); transform-origin: top left; }
            .wallet-box { transform: scale(0.85); transform-origin: top right; }
            #spawn-area { transform: scale(0.8) translateY(-10px); }
        }

        /* โหมดจอจิ๋วขีดสุด (Ultra Small / Widget Mode) */
        @media (max-width: 400px), (max-height: 550px) {
            #bottom-hud { 
                position: relative !important; 
                width: 100% !important; 
                height: 35px !important; 
                display: block !important; 
            }
            .profile-box { transform: scale(0.85) !important; transform-origin: top left !important; }
            .wallet-box { transform: scale(0.85) !important; transform-origin: top right !important; }
            header { padding: 1 !important; width: 100% !important; }
            #spawn-area { position: absolute !important; top: 70px !important; left: 52% !important; transform: translateX(-50%) scale(0.7) !important; transform-origin: top center !important; }
            .hud { padding-top: 0 !important; padding-bottom: 0 !important; }
            
            .stats-panel, .action-panel {
                position: absolute !important;
                bottom: 0 !important;
                margin: 0 !important;
                gap: 4px !important;
                width: max-content !important; 
                max-width: none !important;
                height: 52px !important; 
                padding: 4px 10px !important;
                z-index: 10;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                overflow: visible !important;
            }
            .stats-panel { 
                left: 0% !important; 
                transform-origin: bottom left !important; 
                transform: scale(0.9) !important; 
                flex-direction: row !important; 
            }
            .action-panel { 
                right: 0% !important; 
                transform-origin: bottom right !important; 
                transform: scale(0.9) !important; 
            }

            /* พิเศษสำหรับจอเล็กลงไปอีก (Nano Mode < 300px) */
            @media (max-width: 300px) {
                .profile-box, .wallet-box { transform: scale(0.55) !important; }
                .stats-panel { transform: scale(0.55) !important; }
                .action-panel { transform: scale(0.55) !important; }

                /* ซ่อนข้อความเพื่อให้กล่องเล็กลง */
                .label-text { display: none !important; }
                .stats-panel h1, .action-panel h1 { display: none !important; }
            }

            /* ย่อส่วนหน้าจอเล็กมาก */
            @media (max-width: 280px) {
                .stats-panel { transform: scale(0.42) !important; }
                .action-panel { transform: scale(0.42) !important; }
            }
            @media (max-width: 250px) {
                .stats-panel { transform: scale(0.35) !important; }
                .action-panel { transform: scale(0.35) !important; }
            }
        }

        @media (max-height: 650px) and (orientation: portrait) {
            .hud { padding-top: 6px; padding-bottom: 6px; }
            #bottom-hud { gap: 2px; }
            .stats-panel, .action-panel { padding-top: 6px; padding-bottom: 6px; }
        }

        /* --- SPECIFIC FOR 830x658 SCENARIO (Medium-Narrow) --- */
        @media screen and (max-width: 850px) {
            .profile-box { transform: scale(0.8); transform-origin: top left; }
            .wallet-box { transform: scale(0.8); transform-origin: top right; }
            .stats-panel, .action-panel { max-width: 380px !important; transform: scale(0.85); }
            #spawn-area { transform: scale(0.7) translateY(-20px); opacity: 0.9; }
            header { padding-left: 8px !important; padding-right: 8px !important; }
        }

        /* จริงๆ แนวนอน (Orientation Landscape) */
        @media screen and (orientation: landscape) {
            .hud { padding: 4px 4px !important; } /* ลด padding ด้านข้างให้ชิดขอบจอมากขึ้น */
            #bottom-hud { 
                position: absolute !important; bottom: 0 !important; left: 0 !important; 
                width: 100% !important; display: flex !important; flex-direction: row !important; 
                justify-content: space-between !important; align-items: flex-end !important;
                padding: 0 20px 16px 20px !important;
                transform: none !important;
                z-index: 100 !important;
            }
            #spawn-area { 
                position: absolute !important; top: 10px !important; left: 50% !important; 
                transform: translateX(-50%) scale(0.55) !important; transform-origin: top center !important;
            }
            .stats-panel, .action-panel { 
                max-width: 250px !important; 
                transform: scale(0.75) !important; 
                margin: 0 !important;
            }
            .stats-panel { transform-origin: bottom left !important; }
            .action-panel { transform-origin: bottom right !important; }
            .glass { background: rgba(15, 23, 42, 0.6) !important; }
        }
    </style>
</head>
<body class="text-white">

    <div id="game-container" class="phone-frame transition-all duration-500">
        <!-- 3D Canvas -->
        <div id="three-canvas"></div>

        <div class="hud">
            <div class="hud-content">
                
                <!-- TOP DISTRIBUTED -->
                <header class="flex justify-between items-start px-3 sm:px-5 pt-3 sm:pt-4 pointer-events-auto transition-all w-full">
                    <!-- Left: Profile & XP -->
                    <div class="profile-box glass flex items-center gap-2 sm:gap-3 px-3 sm:px-5 py-2 sm:py-3 rounded-2xl border border-white/5 glow">
                        <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-xl bg-gradient-to-br from-neon-purple to-neon-pink flex items-center justify-center text-lg sm:text-xl shadow-lg">🐱</div>
                        <div class="leading-tight">
                            <h1 class="font-black text-[10px] sm:text-xs text-white/90 uppercase tracking-tight">PetWorld 3D</h1>
                            <div class="flex items-center gap-1.5 sm:gap-2 mt-0.5 sm:mt-1">
                                <span class="text-[8px] sm:text-[9px] font-black text-neon-purple">LV.<span id="hud-level">5</span></span>
                                <div class="w-10 sm:w-12 h-1 bg-black/40 rounded-full overflow-hidden">
                                    <div id="bar-xp" class="h-full bg-gradient-to-r from-neon-purple to-neon-pink" style="width:35%"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Wallet -->
                    <div class="wallet-box flex flex-col items-end gap-3">
                        <div class="glass flex items-center gap-2 px-3 sm:px-5 py-2 sm:py-3 rounded-2xl border border-white/5 glow">
                            <span class="text-sm sm:text-base text-neon-gold">🪙</span>
                            <span id="hud-tokens" class="font-black text-xs sm:text-sm text-neon-gold tracking-tight">2,500</span>
                        </div>
                    </div>
                </header>

                <div class="flex-1 overflow-hidden pointer-events-none"></div>

                </div>
                
                <!-- Instruction Pill (Independent Position) -->
                <div id="spawn-area" class="pointer-events-none flex justify-center w-full z-[100] mt-2">
                    <div class="glass rounded-full px-5 py-2 text-[11px] sm:text-[12px] text-white/70 font-black uppercase tracking-[0.3em] border border-white/10 shadow-lg">
                        👆 กดที่พื้นเพื่อเดิน
                    </div>
                </div>

                <!-- BOTTOM DISTRIBUTED HUD -->
                <div id="bottom-hud" class="flex flex-col gap-2 px-3 sm:px-4 pb-2 sm:pb-4 pointer-events-auto items-center">
                    <!-- Stats Grid -->
                    <div class="stats-panel glass glow rounded-[1.2rem] sm:rounded-[1.5rem] py-2 sm:py-3 px-3 sm:px-5 border border-white/5 max-w-[480px] w-full">
                        <div class="grid grid-cols-4 gap-2 sm:gap-4">
                            <div class="flex flex-col items-center gap-0.5 sm:gap-1">
                                <span class="text-base sm:text-lg">🍖</span>
                                <div class="w-full h-1 bg-black/40 rounded-full overflow-hidden"><div id="bar-hunger" class="h-full bg-gradient-to-r from-orange-500 to-amber-300 transition-all" style="width:85%"></div></div>
                                <span id="val-hunger" class="label-text text-[6px] sm:text-[7px] font-black text-white/40 tracking-tighter uppercase leading-none">85%</span>
                            </div>
                            <div class="flex flex-col items-center gap-0.5 sm:gap-1">
                                <span class="text-base sm:text-lg">💖</span>
                                <div class="w-full h-1 bg-black/40 rounded-full overflow-hidden"><div id="bar-happy" class="h-full bg-gradient-to-r from-pink-500 to-rose-300 transition-all" style="width:92%"></div></div>
                                <span id="val-happy" class="label-text text-[6px] sm:text-[7px] font-black text-white/40 tracking-tighter uppercase leading-none">92%</span>
                            </div>
                            <div class="flex flex-col items-center gap-0.5 sm:gap-1">
                                <span class="text-base sm:text-lg">🧼</span>
                                <div class="w-full h-1 bg-black/40 rounded-full overflow-hidden"><div id="bar-clean" class="h-full bg-gradient-to-r from-cyan-500 to-teal-300 transition-all" style="width:70%"></div></div>
                                <span id="val-clean" class="label-text text-[6px] sm:text-[7px] font-black text-white/40 tracking-tighter uppercase leading-none">70%</span>
                            </div>
                            <div class="flex flex-col items-center gap-0.5 sm:gap-1">
                                <span class="text-base sm:text-lg">⚡</span>
                                <div class="w-full h-1 bg-black/40 rounded-full overflow-hidden"><div id="bar-stamina" class="h-full bg-gradient-to-r from-emerald-500 to-green-300 transition-all" style="width:90%"></div></div>
                                <span id="val-stamina" class="label-text text-[6px] sm:text-[7px] font-black text-white/40 tracking-tighter uppercase leading-none">90%</span>
                            </div>
                        </div>
                    </div>

                    <!-- Actions Shelf -->
                    <div class="action-panel glass glow rounded-[1.5rem] sm:rounded-[2rem] p-0.5 sm:p-1 flex items-center justify-between border border-white/5 max-w-[480px] w-full">
                        <button onclick="doAction('feed')" class="act-btn flex-1 flex flex-col items-center gap-1 sm:gap-1.5 py-2">
                            <div class="w-8 h-8 sm:w-9 sm:h-9 rounded-xl bg-orange-500/10 border border-orange-500/20 flex items-center justify-center text-base sm:text-lg">🍗</div>
                            <span class="label-text text-[6px] sm:text-[7px] font-black text-white/30 uppercase tracking-widest leading-none">Feed</span>
                        </button>
                        <button onclick="doAction('clean')" class="act-btn flex-1 flex flex-col items-center gap-1 sm:gap-1.5 py-2">
                            <div class="w-8 h-8 sm:w-9 sm:h-9 rounded-xl bg-cyan-500/10 border border-cyan-500/20 flex items-center justify-center text-base sm:text-lg">🧼</div>
                            <span class="label-text text-[6px] sm:text-[7px] font-black text-white/30 uppercase tracking-widest leading-none">Clean</span>
                        </button>
                        <button onclick="doAction('repair')" class="act-btn flex-1 flex flex-col items-center gap-1 sm:gap-1.5 py-2">
                            <div class="w-8 h-8 sm:w-9 sm:h-9 rounded-xl bg-amber-500/10 border border-amber-500/20 flex items-center justify-center text-base sm:text-lg">💩</div>
                            <span class="label-text text-[6px] sm:text-[7px] font-black text-white/30 uppercase tracking-widest leading-none">Scoop</span>
                        </button>
                        <button onclick="doAction('play')" class="act-btn flex-1 flex flex-col items-center gap-1 sm:gap-1.5 py-2">
                            <div class="w-8 h-8 sm:w-9 sm:h-9 rounded-xl bg-green-500/10 border border-green-500/20 flex items-center justify-center text-base sm:text-lg">🎾</div>
                            <span class="label-text text-[6px] sm:text-[7px] font-black text-white/30 uppercase tracking-widest leading-none">Play</span>
                        </button>
                        <div class="w-px h-6 sm:h-8 bg-white/5 mx-0.5"></div>
                        <button onclick="toggleRanking()" class="act-btn flex-1 flex flex-col items-center gap-1 sm:gap-1.5 py-2">
                            <div class="w-8 h-8 sm:w-9 sm:h-9 rounded-xl bg-yellow-500/10 border border-yellow-500/20 flex items-center justify-center text-base sm:text-lg">🏆</div>
                            <span class="label-text text-[6px] sm:text-[7px] font-black text-white/30 uppercase tracking-widest leading-none">Rank</span>
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Ranking Modal -->
    <div id="ranking-modal" class="fixed inset-0 z-[200] translate-y-full transition-transform duration-500 flex items-center justify-center">
        <div id="ranking-content" class="w-full max-w-[480px] h-full max-h-[850px] bg-slate-900/98 backdrop-blur-3xl rounded-t-[3rem] border-t border-white/10 flex flex-col p-6 pt-4 mt-[20vh] shadow-2xl overflow-hidden pointer-events-auto">
            <div id="ranking-handle" class="w-full py-4 flex flex-col items-center cursor-pointer">
                <div class="w-16 h-1.5 bg-white/20 rounded-full"></div>
            </div>
            <h2 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-neon-purple to-neon-pink mb-6 px-2 text-white">🏆 World Ranking</h2>
            <div id="ranking-list" class="flex-1 overflow-y-auto space-y-3 no-scroll px-1 pb-10"></div>
        </div>
    </div>

    <script type="module" src="/src/core/game.js"></script>
</body>
</html>
